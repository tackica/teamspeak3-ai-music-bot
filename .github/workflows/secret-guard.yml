name: Secret Guard

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine commit range
        id: range
        shell: bash
        run: |
          set -euo pipefail

          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            range="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
          else
            before="${{ github.event.before }}"
            after="${{ github.sha }}"
            zeros="0000000000000000000000000000000000000000"

            if [ "$before" = "$zeros" ]; then
              default_branch="${{ github.event.repository.default_branch }}"
              git fetch --no-tags origin "$default_branch" --depth=1
              base="$(git merge-base "origin/$default_branch" "$after")"
              range="$base..$after"
            else
              range="$before..$after"
            fi
          fi

          echo "value=$range" >> "$GITHUB_OUTPUT"

      - name: Scan pushed commits for secrets
        run: python3 secret_guard.py range "${{ steps.range.outputs.value }}"
